name: CI/CD

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and test with Maven
        run: mvn clean verify --batch-mode

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/hospital-payment:${{ github.sha }} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/hospital-payment:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/hospital-payment:latest

      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/hospital-payment:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/hospital-payment:latest

      - name: Update image tag in ops repo
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git clone https://x-access-token:${{ secrets.OPS_TOKEN }}@github.com/2026EHTEAMPROJECT/hospital-reservation-ops.git
          cd hospital-reservation-ops
          sed -i "s/newTag: .*/newTag: ${{ github.sha }}/" payment/overlays/dev/kustomization.yaml
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add payment/overlays/dev/kustomization.yaml
          git commit -m "ci: update payment-service image tag to ${{ github.sha }}"
          git push
